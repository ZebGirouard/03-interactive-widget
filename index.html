<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Widget</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">JavaScript + DOM</p>
      <h1>Move through a study checklist.</h1>
      <p id="count">Step 1 of 3</p>
      <ol id="steps" class="steps">
        <li class="active">Read the task</li>
        <li>Make one small change</li>
        <li>Test the result</li>
      </ol>
      <div class="actions">
        <button id="increment">Next step</button>
        <button id="reset">Reset</button>
        <button id="theme">Toggle theme</button>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
